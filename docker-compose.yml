services:
  crypto-bot:
    image: nginx:alpine
    container_name: crypto-scalper-bot
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      # Define strip-prefix middleware
      - "traefik.http.middlewares.crypto-strip.stripprefix.prefixes=/crypto"
      # Apply middleware to the router
      - "traefik.http.routers.crypto.middlewares=crypto-strip"
      # Router rule
      - "traefik.http.routers.crypto.rule=PathPrefix(`/crypto`)"
      - "traefik.http.routers.crypto.entrypoints=web"
      # Service
      - "traefik.http.services.crypto.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik-network"
    volumes:
      - ./html:/usr/share/nginx/html:ro
    networks:
      - traefik-network

networks:
  traefik-network:
    external: true