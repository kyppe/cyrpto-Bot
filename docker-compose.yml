services:
  crypto-bot:
    build: ./bot
    container_name: crypto-scalper-bot
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.crypto-strip.stripprefix.prefixes=/crypto"
      - "traefik.http.routers.crypto.middlewares=crypto-strip"
      - "traefik.http.routers.crypto.rule=PathPrefix(`/crypto`)"
      - "traefik.http.routers.crypto.entrypoints=web"
      - "traefik.http.services.crypto.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik-network"
    volumes:
      - ./data:/app/data
    networks:
      - traefik-network

networks:
  traefik-network:
    external: true