version: '3.8'

services:
  crypto-bot:
    image: nginx:alpine
    container_name: crypto-scalper-bot
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.crypto.rule=PathPrefix(`/crypto`)"
      - "traefik.http.routers.crypto.entrypoints=web"
      - "traefik.http.services.crypto.loadbalancer.server.port=80"
      - "traefik.http.routers.crypto.service=crypto"
      - "traefik.docker.network=traefik-network"
    volumes:
      - ./html:/usr/share/nginx/html:ro
    networks:
      - traefik-network

networks:
  traefik-network:
    external: true